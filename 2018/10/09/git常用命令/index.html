            <h1 id="git常用命令"><a href="#git常用命令" class="headerlink" title="git常用命令"></a>git常用命令</h1><p>1.远程分支关联<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git remote add origin git地址</span><br></pre></td></tr></table></figure></p>
<p>2.获取本地<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git pull &lt;remote&gt; &lt;branch&gt;</span><br></pre></td></tr></table></figure></p>
<p>或者<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git fetch &lt;remote&gt; &lt;branch&gt;</span><br></pre></td></tr></table></figure></p>
<p>区别:pull相当于fetch+merge,所以fetch更安全一点,pull更方便一点<br>3.推送<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git push &lt;remote&gt; &lt;branch&gt;</span><br></pre></td></tr></table></figure></p>
<p>4.只删除远程分支上内容,不删除本地<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">git rm -r --cached .idea  #--cached不会把本地的.idea删除</span><br><span class="line">git commit -m 'delete .idea dir'</span><br><span class="line">git push -u origin master</span><br></pre></td></tr></table></figure></p>
<p>5.查看用户名、邮箱并设置<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">git config user.name</span><br><span class="line">git config user.email</span><br><span class="line">git config --global user.name 新名字</span><br><span class="line">git config --global user.email 新邮箱</span><br></pre></td></tr></table></figure></p>
<p>6.pull分支,对冲突合并<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">git stash #暂存了本地的修改</span><br><span class="line">git pull #获取远程内容到本地</span><br><span class="line">git stash list #查看stash的全部信息</span><br><span class="line">git stash pop stash的id  #恢复指定id的stash快照</span><br></pre></td></tr></table></figure></p>
<p>之后文件会自动标记冲突位置,修改后提交即可<br>(这个冲突一定要注意看好,git的标记的冲突位置是直接在源码里标记的,如果不修改绝对报错,坑的一批)</p>
<p>7.新建分支,合并分支<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">git branch newBranch001</span><br><span class="line">git checkout newBranch001</span><br></pre></td></tr></table></figure></p>
<p>或者<br><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git checkout -b newBranch001</span><br></pre></td></tr></table></figure></p>
